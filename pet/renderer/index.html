<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <!--
      No restrictive CSP here: this page only ever loads LOCAL files, and it
      uses an ES-module importmap to pull Three.js + GLTFLoader straight from
      node_modules. A strict file:// CSP blocks those module fetches, so we
      rely on the app being local-only (no remote content is ever loaded).
    -->
    <title>Krish pet</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        cursor: default;
        user-select: none;
      }
      #scene {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>

    <!-- Resolve bare specifiers used by the renderer and by GLTFLoader. -->
    <script type="importmap">
      {
        "imports": {
          "three": "../node_modules/three/build/three.module.js",
          "three/addons/": "../node_modules/three/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <script type="module" src="renderer.js"></script>
  </body>
</html>
